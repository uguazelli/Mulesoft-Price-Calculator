name: Veridata-Client-Tools
services:
  client-tools:
    build:
      context: .
    container_name: veridata-client-tools
    restart: unless-stopped
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 3000
    volumes:
      - ./public:/app/public
      - ./src:/app/src
      - ./data:/app/data
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
        - action: sync+restart
          path: ./public
          target: /app/public
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./docker-compose.yml
    expose:
      - "3000"
    ports:
      - "3100:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      veridata.network:
        aliases:
          - client.tools

networks:
  veridata.network:
    external: true
    name: veridata.network
